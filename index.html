<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Varshana 🦄</title>
    <style>
        body {
            margin: 0;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Helvetica Neue', sans-serif;
            overflow-x: hidden;
        }

        /* Forces Mobile View on PC */
        .phone-canvas {
            width: 100%;
            max-width: 375px;
            height: 667px; /* Classic Mobile Ratio */
            background: linear-gradient(to bottom, #e0c3fc 0%, #8ec5fc 100%);
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            overflow: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .mountains {
            position: absolute;
            bottom: 0;
            width: 100%;
            opacity: 0.3;
            z-index: 1;
        }

        .content {
            z-index: 2;
            text-align: center;
            margin-top: 50px;
        }

        .advice-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .advice-card.show {
            transform: translateY(0);
            opacity: 1;
        }

        h2 { color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        
        .poem-text {
            color: #2d3436;
            font-size: 1.1rem;
            line-height: 1.6;
            font-style: italic;
        }

        .gift-btn {
            font-size: 60px;
            cursor: pointer;
            transition: transform 0.3s ease;
            margin-top: 40px;
            z-index: 3;
        }

        .gift-btn:hover { transform: scale(1.2) rotate(10deg); }

        .unicorn-float {
            position: absolute;
            animation: fly 6s infinite linear;
            font-size: 24px;
            opacity: 0.7;
        }

        @keyframes fly {
            0% { transform: translate(-200px, 100px) rotate(0deg); }
            100% { transform: translate(400px, -300px) rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="phone-canvas">
    <div class="unicorn-float">🦄</div>
    <div class="unicorn-float" style="animation-delay: 3s;">✨</div>

    <div class="content">
        <h2>Happy Birthday, Varshana! 🦄</h2>
        
        <div class="gift-btn" id="gift" onclick="reveal()">🎁</div>

        <div class="advice-card" id="card">
            <p class="poem-text">
                "Look, enjoy life to the fullest. <br>
                Apart from all the boy-drama and love, <br>
                <strong>Just focus on YOU.</strong> <br><br>
                Go to college, make grand entries, <br>
                Have fun, and collect memories. <br>
                Always stay happy in life!"
            </p>
            <p style="font-size: 25px;">🏔️✨🦄✨🏔️</p>
        </div>
    </div>
</div>

<script>
    function reveal() {
        document.getElementById('card').classList.add('show');
        document.getElementById('gift').innerHTML = '🦄';
        document.getElementById('gift').style.transform = 'scale(1.5)';
    }
</script>

</body>
</html>
